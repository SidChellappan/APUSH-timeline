
<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: transparent; }

  .wrap { padding: 0.5rem 0 2rem; }

  .header { margin-bottom: 20px; }
  .header h2 { font-size: 18px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--color-text-secondary); }

  .progress-bar-wrap { background: var(--color-background-secondary); border-radius: 4px; height: 6px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #185FA5, #0F6E56); transition: width 0.4s; }

  .era-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  @media (max-width: 500px) { .era-grid { grid-template-columns: 1fr; } }

  .era-btn {
    padding: 10px 12px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    cursor: pointer; text-align: left;
    transition: all 0.15s;
  }
  .era-btn:hover { background: var(--color-background-secondary); }
  .era-btn.done { border-color: #2D6A4F; background: #D8F3DC; }
  .era-btn.active { border-color: #185FA5; background: #E6F1FB; }
  .era-btn-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
  .era-dates { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: var(--color-text-tertiary); text-transform: uppercase; }
  .era-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .era-check { font-size: 14px; }
  .era-preview { font-size: 11px; color: var(--color-text-tertiary); line-height: 1.4; margin-top: 2px; }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    display: none;
  }
  .card.active { display: block; }

  .card-header {
    padding: 16px 18px 14px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .card-header-left {}
  .card-era-dates { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .card-era-name { font-size: 20px; font-weight: 600; color: var(--color-text-primary); }
  .card-emoji { font-size: 28px; flex-shrink: 0; }

  .card-body { padding: 16px 18px; }

  .vibe {
    padding: 8px 12px; border-radius: var(--border-radius-md);
    font-size: 13px; font-weight: 500; margin-bottom: 14px;
    border-left: 3px solid;
  }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-tertiary); margin-bottom: 8px; margin-top: 14px; }

  .fact-list { display: flex; flex-direction: column; gap: 6px; }
  .fact-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 12px;
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    font-size: 13px; color: var(--color-text-primary); line-height: 1.5;
  }
  .fact-icon { flex-shrink: 0; font-size: 14px; }

  .exam-tip {
    margin-top: 14px; padding: 10px 14px;
    background: #FEF3CD; border-left: 2px solid #C8962A;
    border-radius: 0;
    font-size: 13px; color: #633806; line-height: 1.6;
  }
  .exam-tip strong { font-weight: 600; }

  .nav-row { display: flex; gap: 8px; padding: 14px 18px; border-top: 0.5px solid var(--color-border-tertiary); }
  .nav-btn {
    flex: 1; padding: 9px; font-size: 13px; font-weight: 500;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    cursor: pointer; background: var(--color-background-primary);
    color: var(--color-text-primary);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
  .nav-btn.done-btn { background: #0F6E56; color: #fff; border-color: #0F6E56; }

  .complete-screen {
    text-align: center; padding: 32px 20px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    display: none;
  }
  .complete-screen.show { display: block; }
  .complete-big { font-size: 48px; margin-bottom: 8px; }
  .complete-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .complete-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 20px; line-height: 1.6; }
  .complete-btn { display: inline-block; padding: 10px 24px; background: #185FA5; color: #fff; border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; font-weight: 500; border: none; }
</style>
</head>

        <span class="era-check">${done.has(i) ? '✅' : '○'}</span>
      </div>
      <div class="era-name">${e.emoji} ${e.name}</div>
    </div>
  `).join('');

  if (activeIdx === null) {
    container.innerHTML = '';
    if (done.size === eras.length) {
      complete.classList.add('show');
    }
    return;
  }

  complete.classList.remove('show');
  const e = eras[activeIdx];
  container.innerHTML = `
    <div class="card active" style="border-top: 3px solid ${e.color}">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-era-dates" style="color:${e.color}">${e.dates}</div>
          <div class="card-era-name">${e.name}</div>
        </div>
        <div class="card-emoji">${e.emoji}</div>
      </div>
      <div class="card-body">
        <div class="vibe" style="background:${e.vibeBg}; border-color:${e.color}; color:${e.color}">${e.vibe}</div>
        <div class="section-label">Key facts</div>
        <div class="fact-list">${e.facts.map(f => `<div class="fact-item"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`).join('')}</div>
        <div class="exam-tip"><strong>⚡ AP exam tip:</strong> ${e.tip}</div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" onclick="closeEra()" ${activeIdx === null ? 'disabled' : ''}>← Back</button>
        <button class="nav-btn ${done.has(activeIdx) ? '' : 'done-btn'}" onclick="markDone(${activeIdx})">
          ${done.has(activeIdx) ? 'Mark undone' : '✓ Got it'}
        </button>
        ${activeIdx < eras.length - 1 ? `<button class="nav-btn primary" onclick="openEra(${activeIdx + 1})">Next →</button>` : `<button class="nav-btn primary" onclick="finishAll()">Finish 🎯</button>`}
      </div>
    </div>
  `;
  container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function openEra(i) {
  activeIdx = i;
  render();
}

function closeEra() {
  activeIdx = null;
  render();
}

function markDone(i) {
  if (done.has(i)) done.delete(i);
  else done.add(i);
  render();
}

function finishAll() {
  eras.forEach((_, i) => done.add(i));
  activeIdx = null;
  render();
}

function resetAll() {
  done.clear();
  activeIdx = null;
  document.getElementById('completeScreen').classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
